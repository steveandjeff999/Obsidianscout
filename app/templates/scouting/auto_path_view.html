{% extends 'base.html' %}

{% block title %}Auto Path View{% endblock %}
{% block heading %}Auto Path View{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h3>Team {{ team.team_number }} &mdash; {{ match.match_type|capitalize }} {{ match.match_number }}</h3>
        <div class="position-relative u-max-w-900 mx-auto">
            <img id="field-image" src="{{ url_for('static', filename='Feild-2025.png') }}" alt="Field" class="img-no-drag" draggable="false">
            <canvas id="view-canvas" class="canvas-overlay"></canvas>
        </div>
        <div class="mt-3 text-center">
            <a href="{{ url_for('scouting.auto_path_list') }}" class="btn btn-secondary">Back to list</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const fieldImage = document.getElementById('field-image');
const canvas = document.getElementById('view-canvas');
const ctx = canvas ? canvas.getContext('2d') : null;
let drawingData = {{ drawing.data|tojson if drawing else '[]' }};

function resizeCanvas() {
    if (!canvas || !fieldImage) return;
    canvas.width = fieldImage.clientWidth;
    canvas.height = fieldImage.clientHeight;
    redraw();
}

function redraw() {
    if (!canvas || !ctx) return;
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (!drawingData || !drawingData.length) return;
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 3;
    drawingData.forEach(entry=>{
        if (entry.points && entry.points.length) {
            ctx.beginPath();
            entry.points.forEach((pt,idx)=>{
                const x=pt.x*rect.width;
                const y=pt.y*rect.height;
                if(idx===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke();
        }
        if(entry.type==='score' || entry.type==='click'){
            (entry.points||[{x:entry.x,y:entry.y}]).forEach(pt=>{
                const x=pt.x*rect.width;
                const y=pt.y*rect.height;
                ctx.fillStyle='#007bff';
                ctx.beginPath(); ctx.arc(x,y,6,0,2*Math.PI); ctx.fill();
            });
        }
    });
}

window.addEventListener('resize', resizeCanvas);
fieldImage && fieldImage.addEventListener('load', resizeCanvas);
if(fieldImage && fieldImage.complete) resizeCanvas();
</script>
{% endblock %}
